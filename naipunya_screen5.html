<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naipunya - Your Turn</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Georgia, serif;
            background: #faf8f3;
            color: #2c2c2c;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 60px 20px;
        }

        .screen {
            max-width: 600px;
            width: 100%;
        }

        /* PROGRESS INDICATOR */
        .progress {
            display: flex;
            gap: 8px;
            margin-bottom: 48px;
        }

        .progress-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
        }

        .progress-dot.done {
            background: #2c2c2c;
        }

        .progress-dot.current {
            background: #2c2c2c;
            width: 24px;
            border-radius: 4px;
        }

        /* QUESTION */
        .question-area {
            margin-bottom: 40px;
        }

        .question-label {
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 16px;
        }

        .question-text {
            font-size: 32px;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .question-sub {
            font-size: 16px;
            color: #666;
            margin-top: 8px;
        }

        /* INPUT */
        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .answer-input {
            font-size: 24px;
            padding: 12px 20px;
            border: 2px solid #2c2c2c;
            background: transparent;
            width: 160px;
            text-align: center;
            outline: none;
            font-family: Georgia, serif;
            transition: border-color 0.3s;
        }

        .answer-input:focus {
            border-color: #1565c0;
        }

        .answer-input.correct {
            border-color: #2e7d32;
            background: #f1f8e9;
        }

        .answer-input.wrong {
            border-color: #c62828;
            background: #fff5f5;
        }

        .submit-btn {
            padding: 12px 32px;
            font-size: 18px;
            background: #2c2c2c;
            color: #faf8f3;
            border: none;
            cursor: pointer;
            font-family: Georgia, serif;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #444;
        }

        .submit-btn:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        /* FEEDBACK */
        .feedback {
            padding: 16px 20px;
            margin-bottom: 24px;
            font-size: 17px;
            line-height: 1.6;
            border-left: 4px solid transparent;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.4s ease;
        }

        .feedback.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .feedback.correct-fb {
            border-color: #2e7d32;
            background: #f1f8e9;
        }

        .feedback.hint-fb {
            border-color: #f57c00;
            background: #fff8f0;
        }

        .feedback.simpler-fb {
            border-color: #1565c0;
            background: #f0f4ff;
        }

        /* SIMPLER PROBLEM */
        .simpler-block {
            display: none;
            margin-top: 32px;
            padding-top: 32px;
            border-top: 1px solid #ddd;
        }

        .simpler-block.visible {
            display: block;
        }

        /* HINT TRAIL */
        .hint-trail {
            margin-bottom: 32px;
        }

        .hint-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            background: #fff;
            border: 1px solid #ddd;
            font-size: 15px;
            color: #666;
            border-radius: 2px;
        }

        .hint-item .hint-q {
            color: #f57c00;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        /* SUCCESS STATE */
        .success-block {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .success-block.visible {
            display: block;
        }

        .success-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .success-title {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .success-sub {
            font-size: 16px;
            color: #666;
            margin-bottom: 32px;
        }

        .success-working {
            background: #fff;
            border: 2px solid #2c2c2c;
            padding: 20px 28px;
            text-align: left;
            font-size: 18px;
            line-height: 2;
            margin-bottom: 32px;
        }

        .next-btn {
            padding: 14px 48px;
            font-size: 18px;
            background: #2c2c2c;
            color: #faf8f3;
            border: none;
            cursor: pointer;
            font-family: Georgia, serif;
        }

        /* ATTEMPT COUNTER */
        .attempt-info {
            font-size: 13px;
            color: #bbb;
            margin-top: 8px;
        }

        .working-hint {
            font-size: 15px;
            color: #888;
            margin-top: 24px;
            padding: 12px 16px;
            border: 1px dashed #ddd;
            display: none;
        }

        .working-hint.visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="screen">

        <!-- PROGRESS -->
        <div class="progress">
            <div class="progress-dot done"></div>
            <div class="progress-dot done"></div>
            <div class="progress-dot done"></div>
            <div class="progress-dot done"></div>
            <div class="progress-dot current"></div>
        </div>

        <!-- MAIN QUESTION -->
        <div class="question-area" id="mainQuestion">
            <div class="question-label">Your turn</div>
            <div class="question-text">What is 17 × 23?</div>
            <div class="question-sub">Use what you just discovered.</div>
        </div>

        <!-- INPUT -->
        <div id="mainInputArea">
            <div class="input-row">
                <input class="answer-input" type="number" id="mainAnswer" placeholder="?"
                    onkeydown="if(event.key==='Enter') checkMain()">
                <button class="submit-btn" onclick="checkMain()" id="mainBtn">Check</button>
            </div>
            <div class="attempt-info" id="attemptInfo"></div>
            <div class="working-hint" id="workingHint">
                Hint: Try writing 17 and 23 around a midpoint, like we did with 12 and 14.
            </div>
        </div>

        <!-- FEEDBACK -->
        <div class="feedback" id="mainFeedback"></div>

        <!-- HINT TRAIL (builds up as student struggles) -->
        <div class="hint-trail" id="hintTrail"></div>

        <!-- SIMPLER PROBLEM -->
        <div class="simpler-block" id="simplerBlock">
            <div class="question-label">Let's build back up</div>
            <div class="question-text" id="simplerQ">What is 9 × 11?</div>
            <div class="question-sub">Same pattern. Smaller numbers.</div>
            <div style="margin-top: 24px;">
                <div class="input-row">
                    <input class="answer-input" type="number" id="simplerAnswer" placeholder="?"
                        onkeydown="if(event.key==='Enter') checkSimpler()">
                    <button class="submit-btn" onclick="checkSimpler()" id="simplerBtn">Check</button>
                </div>
            </div>
            <div class="feedback" id="simplerFeedback"></div>
        </div>

        <!-- SUCCESS -->
        <div class="success-block" id="successBlock">
            <div class="success-icon">✓</div>
            <div class="success-title">You found it yourself.</div>
            <div class="success-sub">17 × 23 = 391. Here's the pattern you used:</div>
            <div class="success-working" id="successWorking"></div>
            <button class="next-btn" onclick="nextScreen()">Next challenge →</button>
        </div>

    </div>

    <script>
        let attempts = 0;
        let hintsGiven = 0;
        let simplerSolved = false;
        const CORRECT = 391;
        const SIMPLER_CORRECT = 99;

        function showFeedback(id, message, type) {
            const el = document.getElementById(id);
            el.className = 'feedback ' + type;
            el.innerHTML = message;
            setTimeout(() => el.classList.add('visible'), 50);
        }

        function addHintToTrail(question, answer) {
            const trail = document.getElementById('hintTrail');
            const item = document.createElement('div');
            item.className = 'hint-item';
            item.innerHTML = `<div class="hint-q">Hint</div>${question}<br><strong>${answer}</strong>`;
            trail.appendChild(item);
        }

        function checkMain() {
            const val = parseInt(document.getElementById('mainAnswer').value);
            attempts++;

            if (val === CORRECT) {
                // SUCCESS
                document.getElementById('mainAnswer').classList.add('correct');
                showSuccess('direct');
            } else if (attempts === 1) {
                // First wrong: give hint 1
                hintsGiven++;
                document.getElementById('mainAnswer').classList.add('wrong');
                document.getElementById('mainAnswer').value = '';
                showFeedback('mainFeedback',
                    'Not quite. <strong>What number sits exactly halfway between 17 and 23?</strong>',
                    'hint-fb'
                );
                document.getElementById('attemptInfo').textContent = 'Think about the midpoint.';
                document.getElementById('workingHint').classList.add('visible');

            } else if (attempts === 2) {
                // Second wrong: give hint 2
                hintsGiven++;
                document.getElementById('mainAnswer').classList.add('wrong');
                document.getElementById('mainAnswer').value = '';
                showFeedback('mainFeedback',
                    'The midpoint is 20. Can you write <strong>17 as (20 − ?)</strong> and <strong>23 as (20 + ?)</strong>?',
                    'hint-fb'
                );
                addHintToTrail('Midpoint of 17 and 23:', '20');
                document.getElementById('attemptInfo').textContent = 'Try (20 − 3)(20 + 3)';

            } else if (attempts >= 3) {
                // Third wrong: simpler problem
                document.getElementById('mainAnswer').classList.add('wrong');
                document.getElementById('mainAnswer').value = '';
                document.getElementById('mainBtn').disabled = true;
                showFeedback('mainFeedback',
                    'Let\'s build back up with a simpler version first.',
                    'simpler-fb'
                );
                addHintToTrail('17 = (20 − 3) and 23 = (20 + 3)', 'So 17 × 23 = (20−3)(20+3)');
                setTimeout(() => {
                    document.getElementById('simplerBlock').classList.add('visible');
                    document.getElementById('simplerBlock').scrollIntoView({ behavior: 'smooth' });
                }, 800);
            }
        }

        function checkSimpler() {
            const val = parseInt(document.getElementById('simplerAnswer').value);

            if (val === SIMPLER_CORRECT) {
                document.getElementById('simplerAnswer').classList.add('correct');
                simplerSolved = true;
                showFeedback('simplerFeedback',
                    '✓ 9 × 11 = (10−1)(10+1) = 100 − 1 = 99. Same pattern. Now go back to 17 × 23.',
                    'correct-fb'
                );
                addHintToTrail('9 × 11 using the pattern:', '(10−1)(10+1) = 10² − 1² = 99');

                // Re-enable main input
                setTimeout(() => {
                    document.getElementById('mainBtn').disabled = false;
                    document.getElementById('mainAnswer').classList.remove('wrong');
                    document.getElementById('mainAnswer').value = '';
                    document.getElementById('mainAnswer').focus();
                    document.getElementById('mainQuestion').scrollIntoView({ behavior: 'smooth' });
                    showFeedback('mainFeedback',
                        'Now try 17 × 23 again. You know the pattern.',
                        'hint-fb'
                    );
                }, 1200);

            } else {
                document.getElementById('simplerAnswer').classList.add('wrong');
                document.getElementById('simplerAnswer').value = '';
                showFeedback('simplerFeedback',
                    '9 = (10 − 1) and 11 = (10 + 1). What is 10² − 1²?',
                    'hint-fb'
                );
            }
        }

        function showSuccess(path) {
            document.getElementById('mainInputArea').style.display = 'none';
            document.getElementById('mainFeedback').style.display = 'none';
            document.getElementById('hintTrail').style.display = 'none';
            document.getElementById('simplerBlock').style.display = 'none';

            // Build working based on path
            let working = '';
            if (hintsGiven === 0) {
                working = `17 × 23<br>
                = (20 − 3)(20 + 3)<br>
                = 20² − 3²<br>
                = 400 − 9<br>
                = <strong>391</strong>`;
            } else {
                working = `17 × 23<br>
                = (20 − 3)(20 + 3) &nbsp; <span style="color:#888; font-size:15px;">midpoint is 20</span><br>
                = 20² − 3² &nbsp; <span style="color:#888; font-size:15px;">middle terms cancel</span><br>
                = 400 − 9<br>
                = <strong>391</strong>`;
            }

            document.getElementById('successWorking').innerHTML = working;
            document.getElementById('successBlock').classList.add('visible');
            document.getElementById('successBlock').scrollIntoView({ behavior: 'smooth' });
        }

        function nextScreen() {
            window.location.href = 'naipunya_screen6.html';
        }
    </script>
</body>

</html>
