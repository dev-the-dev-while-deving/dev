<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naipunya</title>
    <style>
        body {
            font-family: Georgia, serif;
            background: #faf8f3;
            color: #2c2c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .screen {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 40px;
        }

        .question {
            font-size: 28px;
            margin-bottom: 40px;
            line-height: 1.4;
        }

        .input-box {
            font-size: 24px;
            padding: 12px 20px;
            border: 2px solid #2c2c2c;
            background: transparent;
            width: 120px;
            text-align: center;
            outline: none;
        }

        .submit-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 40px;
            font-size: 18px;
            background: #2c2c2c;
            color: #faf8f3;
            border: none;
            cursor: pointer;
            font-family: Georgia, serif;
        }
    </style>
</head>

<body>
    <div class="screen">
        <div class="question">
            What is 12 × 14?
        </div>
        <input class="input-box" type="number" id="answer" placeholder="?">
        <button class="submit-btn" onclick="checkAnswer()">Check</button>
    </div>

    <script>
        let stage = 1;

        function checkAnswer() {
            const answer = parseInt(document.getElementById('answer').value);

            if (stage === 1) {
                if (answer === 168) {
                    stage = 2;
                    document.querySelector('.question').innerHTML =
                        'Interesting. Now what is 13² − 1²?';
                    document.getElementById('answer').value = '';
                } else {
                    document.getElementById('answer').placeholder = 'Try again';
                }
            }

            else if (stage === 2) {
                if (answer === 168) {
                    stage = 3;
                    document.querySelector('.question').innerHTML =
                        'Both equal 168. Why?';
                    document.getElementById('answer').outerHTML =
                        '<textarea id="answer" style="font-size:18px; padding:12px; width:100%; height:100px; border: 2px solid #2c2c2c; background:transparent; font-family:Georgia,serif;"></textarea>';
                } else {
                    document.getElementById('answer').value = '';
                }
            }

            else if (stage === 3) {
                stage = 4;
                document.querySelector('.question').innerHTML =
                    'Let\'s find out together.';
                document.querySelector('.submit-btn').textContent = 'Show me';
            }

            else if (stage === 4) {
                window.location.href = 'naipunya_proof_journey.html';
            }
        }
    </script>
</body>

</html>
